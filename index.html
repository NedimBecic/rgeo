<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zadaca 1 - Zadatak 3</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="workspace" aria-label="Bezierova kriva">
      <div class="toolbar">
        <div>
          <h1>Zadaca 1, zadatak 3</h1>
          <p id="status">Kliknite na platno da zadate upravljacke tacke.</p>
        </div>
        <div class="controls">
          <label for="pointCount">Broj tacaka</label>
          <input id="pointCount" type="number" min="2" max="1000" value="100">
          <button id="generateButton" type="button">Generisi krivu</button>
          <button id="clearButton" type="button">Ocisti</button>
        </div>
      </div>
      <canvas id="canvas" width="900" height="560"></canvas>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
